<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #121212; }
        #tvchart { position: absolute; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="tvchart"></div>
    <script>
        let chart;
        let candlestickSeries;

        function initChart(dataStr) {
            const data = JSON.parse(dataStr);
            chart = LightweightCharts.createChart(document.getElementById('tvchart'), {
                layout: {
                    background: { type: 'solid', color: '#121212' },
                    textColor: 'rgba(255, 255, 255, 0.9)',
                },
                grid: {
                    vertLines: { color: 'rgba(197, 203, 206, 0.2)' },
                    horzLines: { color: 'rgba(197, 203, 206, 0.2)' },
                },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                rightPriceScale: { borderColor: 'rgba(197, 203, 206, 0.8)' },
                timeScale: { borderColor: 'rgba(197, 203, 206, 0.8)' },
            });

            candlestickSeries = chart.addCandlestickSeries({
                upColor: '#26a69a',
                downColor: '#ef5350',
                borderVisible: false,
                wickUpColor: '#26a69a',
                wickDownColor: '#ef5350',
            });

            candlestickSeries.setData(data);
            chart.timeScale().fitContent();
        }

        function addTick(tickStr) {
            if (!candlestickSeries) return;
            const tick = JSON.parse(tickStr);
            candlestickSeries.update(tick);
        }
    </script>
</body>
</html>
